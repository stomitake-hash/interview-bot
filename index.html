<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接合否ボット</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f7f4;--surface:#ffffff;--border:#e5e3dc;--border2:#d0cec6;
    --text:#1a1a1a;--text2:#555;--text3:#888;
    --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-text:#0F6E56;
    --red:#D84040;--red-bg:#FCEBEB;--red-text:#A32D2D;
    --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#633806;
    --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
    --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
    --radius:10px;--radius-sm:6px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
  .screen{display:none;min-height:100vh;padding:1.5rem 1rem}
  .screen.active{display:block}
  .container{max-width:1100px;margin:0 auto}
  .container-sm{max-width:680px;margin:0 auto}
  .top-hero{text-align:center;padding:4rem 1rem 2rem}
  .top-hero h1{font-size:2rem;font-weight:700;margin-bottom:.5rem}
  .top-hero p{color:var(--text2);font-size:1rem;margin-bottom:2.5rem}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:480px;margin:0 auto}
  .role-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.75rem 1.25rem;cursor:pointer;text-align:center;transition:border-color .15s,transform .1s}
  .role-card:hover{border-color:var(--teal);transform:translateY(-2px)}
  .role-card .icon{font-size:2rem;margin-bottom:.75rem}
  .role-card h2{font-size:1rem;font-weight:600;margin-bottom:.35rem}
  .role-card p{font-size:.8rem;color:var(--text3)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.875rem}
  .card-title{font-size:.7rem;color:var(--text3);letter-spacing:.06em;margin-bottom:.875rem;text-transform:uppercase}
  label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.3rem;margin-top:.75rem}
  label:first-child{margin-top:0}
  input[type=text],select,textarea{width:100%;padding:.6rem .8rem;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
  input[type=text]:focus,select:focus,textarea:focus{border-color:var(--teal)}
  textarea{resize:vertical;min-height:80px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;font-size:.875rem;font-family:inherit;color:var(--text);cursor:pointer;transition:background .12s}
  .btn:hover{background:var(--bg)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
  .btn.primary:hover{opacity:.85}
  .btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
  .btn.teal:hover{opacity:.85}
  .btn.danger{color:var(--red-text);border-color:#f0a0a0}
  .btn.danger:hover{background:var(--red-bg)}
  .btn.ghost{border-color:transparent;color:var(--text3)}
  .btn.ghost:hover{color:var(--text);background:var(--bg)}
  .btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
  .btn-row{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
  .btn-full{width:100%;padding:.75rem}
  .badge{display:inline-block;font-size:.7rem;padding:.2rem .6rem;border-radius:20px}
  .badge.blue{background:var(--blue-bg);color:var(--blue-text)}
  .badge.teal{background:var(--teal-bg);color:var(--teal-text)}
  .badge.red{background:var(--red-bg);color:var(--red-text)}
  .badge.amber{background:var(--amber-bg);color:var(--amber-text)}
  .badge.purple{background:var(--purple-bg);color:var(--purple-text)}
  .badge.gray{background:var(--bg);color:var(--text3);border:1px solid var(--border)}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
  .progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
  .step-dots{display:flex;gap:.4rem;align-items:center}
  .step-dot{width:7px;height:7px;border-radius:50%;background:var(--border2)}
  .step-dot.done{background:var(--teal)}
  .step-dot.active{background:var(--text)}
  .score-bar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
  .score-bar-label{font-size:.8rem;color:var(--text2);width:110px;flex-shrink:0}
  .score-bar-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
  .score-bar-fill{height:100%;border-radius:4px;background:var(--teal);transition:width .4s}
  .score-bar-num{font-size:.8rem;color:var(--text2);width:36px;text-align:right}
  .star-row{display:flex;gap:.3rem;margin:.3rem 0 .75rem}
  .star{font-size:1.4rem;cursor:pointer;color:var(--border2);transition:color .1s}
  .star.active{color:#E9A800}
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
  .meta{font-size:.8rem;color:var(--text3)}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0}
  .verdict-box{border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:.875rem}
  .verdict-box.pass{background:var(--teal-bg);border:1px solid #9FE1CB}
  .verdict-box.fail{background:var(--red-bg);border:1px solid #F7C1C1}
  .verdict-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#fff;flex-shrink:0}
  .verdict-box.pass .verdict-icon{background:var(--teal)}
  .verdict-box.fail .verdict-icon{background:var(--red)}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.25rem}
  .stat{background:var(--bg);border-radius:var(--radius-sm);padding:.875rem;text-align:center}
  .stat-val{font-size:1.5rem;font-weight:600;color:var(--text)}
  .stat-label{font-size:.7rem;color:var(--text3)}
  .list-item{display:flex;align-items:center;gap:.75rem;padding:.875rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
  .list-item:hover{background:var(--bg)}
  .list-item:last-child{border-bottom:none}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:.9rem}
  .tag-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
  .tag{font-size:.75rem;padding:.25rem .6rem;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text2);cursor:pointer}
  .tag.on{background:var(--blue-bg);color:var(--blue-text);border-color:#B5D4F4}
  .iv-layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start}
  .iv-prev{background:var(--purple-bg);border:1px solid #AFA9EC;border-radius:var(--radius);padding:1rem}
  .iv-prev-label{font-size:.7rem;color:var(--purple-text);font-weight:600;letter-spacing:.04em;margin-bottom:.5rem}
  .iv-prev-q{font-size:.8rem;font-weight:600;color:var(--purple-text);margin-bottom:.35rem}
  .iv-prev-a{font-size:.875rem;color:var(--text2);line-height:1.6}
  .iv-prev-memo{font-size:.8rem;color:var(--text3);font-style:italic;border-top:1px solid #AFA9EC;padding-top:.4rem;margin-top:.4rem}
  .iv-current{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
  .ans-memo-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem}
  .memo-col{background:var(--amber-bg);border-radius:var(--radius-sm);padding:.75rem}
  .memo-col-label{font-size:.7rem;color:var(--amber-text);font-weight:600;margin-bottom:.4rem}
  .followup-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem;margin-top:.75rem}
  .followup-label{font-size:.7rem;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:.4rem}
  .history-hint{background:var(--teal-bg);border:1px solid #9FE1CB;border-radius:var(--radius-sm);padding:.6rem .875rem;font-size:.8rem;color:var(--teal-text);margin-top:.5rem;display:none}
  .stage-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
  .stage-tab{padding:.4rem .875rem;border-radius:20px;font-size:.8rem;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent}
  .stage-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
  .cat-chuto{background:#E6F1FB;color:#0C447C;border:1px solid #B5D4F4;font-size:.7rem;padding:.2rem .7rem;border-radius:20px;display:inline-block}
  .cat-shinsotsu{background:#E1F5EE;color:#0F6E56;border:1px solid #9FE1CB;font-size:.7rem;padding:.2rem .7rem;border-radius:20px;display:inline-block}
</style>
</head>
<body>

<div id="screen-top" class="screen active">
  <div class="container-sm">
    <div class="top-hero">
      <h1>面接合否ボット</h1>
      <p>評価を統一して、根拠を残す。</p>
      <div class="role-grid">
        <div class="role-card" onclick="goInterviewer()"><div class="icon">🎤</div><h2>面接官</h2><p>質問・回答を入力して面接を進める</p></div>
        <div class="role-card" onclick="goManager()"><div class="icon">📋</div><h2>採用担当者</h2><p>スコアを確認して合否を決定する</p></div>
      </div>
    </div>
  </div>
</div>

<div id="screen-setup" class="screen">
  <div class="container-sm">
    <div class="header-row">
      <button class="btn ghost" onclick="show('top')">← 戻る</button>
      <span class="meta">面接官</span>
    </div>
    <div class="card">
      <div class="card-title">候補者情報</div>
      <label>候補者名</label>
      <input type="text" id="setup-name" placeholder="山田 太郎" oninput="checkHistory(this.value)">
      <div id="history-hint" class="history-hint"></div>
      <label>応募ポジション</label>
      <input type="text" id="setup-pos" placeholder="エンジニア（バックエンド）">
      <label>採用区分</label>
      <select id="setup-category" onchange="onCategoryChange()" style="margin-bottom:.5rem">
        <option value="中途">中途採用</option>
        <option value="新卒">新卒採用</option>
      </select>
      <label>面接の種類</label>
      <select id="setup-type" onchange="onStageChange()">
        <option value="1次面接">1次面接</option>
        <option value="2次面接">2次面接</option>
        <option value="最終面接">最終面接</option>
      </select>
      <label>面接官名</label>
      <input type="text" id="setup-interviewer" placeholder="田中 一郎">
    </div>
    <div class="card">
      <div class="card-title">評価軸を選択・追加</div>
      <div class="tag-row" id="axis-tags"></div>
      <div style="display:flex;gap:.5rem;margin-top:.875rem">
        <input type="text" id="new-axis-input" placeholder="新しい評価軸を入力（例：誠実さ）" style="flex:1" onkeydown="if(event.key==='Enter')addAxis()">
        <button class="btn" onclick="addAxis()">追加</button>
      </div>
      <button class="btn teal" onclick="saveSelectedAxes()" style="margin-top:.5rem;width:100%">この評価軸の選択を固定保存</button>
      <div id="axes-saved-msg" style="display:none;font-size:.8rem;color:var(--teal-text);margin-top:.4rem">✓ 保存しました。次回から自動で選択されます</div>
    </div>
    <div class="card">
      <div class="card-title">質問テンプレート</div>
      <div class="stage-tabs">
        <div class="stage-tab active" onclick="switchStageTab('1次面接',this)">1次面接</div>
        <div class="stage-tab" onclick="switchStageTab('2次面接',this)">2次面接</div>
        <div class="stage-tab" onclick="switchStageTab('最終面接',this)">最終面接</div>
      </div>
      <div id="q-list"></div>
      <button class="btn" onclick="addQuestion()" style="margin-top:.5rem">+ 質問を追加</button>
      <button class="btn teal" onclick="saveTemplateSet()" style="margin-top:.5rem">このリストをテンプレとして保存</button>
      <div id="template-saved-msg" style="display:none;font-size:.8rem;color:var(--teal-text);margin-top:.4rem">✓ 保存しました</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.5rem">
      <button class="btn" onclick="printSheet()">📄 面接シートを印刷</button>
      <button class="btn teal" onclick="startInterview()">面接を開始する →</button>
    </div>
  </div>
</div>

<div id="screen-interview" class="screen">
  <div class="container">
    <div class="header-row">
      <div style="display:flex;align-items:center;gap:.75rem">
        <button class="btn ghost" style="padding:.4rem .6rem;font-size:.8rem" onclick="if(confirm('トップに戻りますか？入力中のデータは保存されません。'))show('top')">← 戻る</button>
        <div>
          <div style="font-weight:600" id="iv-name"></div>
          <div class="meta" id="iv-pos"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <div class="step-dots" id="iv-dots"></div>
        <span class="meta" id="iv-prog"></span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="iv-bar"></div></div>
    <div id="iv-content"></div>
  </div>
</div>

<div id="screen-done" class="screen">
  <div class="container-sm">
    <div style="text-align:center;padding:2rem 0 1.5rem">
      <div style="font-size:2.5rem;margin-bottom:.75rem">✓</div>
      <h2 style="font-size:1.25rem;margin-bottom:.4rem">面接完了</h2>
      <p class="meta">データを保存しました</p>
    </div>
    <div class="stat-grid" id="done-stats"></div>
    <div class="card" style="text-align:center">
      <div style="font-size:.875rem;font-weight:600;margin-bottom:.4rem">採用担当者に共有する</div>
      <p class="meta" style="margin-bottom:1rem">面接データをファイルに書き出してSlackやメールで送ってください。</p>
      <button class="btn teal btn-full" onclick="exportLastSession()">データをダウンロード</button>
    </div>
    <button class="btn ghost btn-full" style="margin-top:.5rem" onclick="show('top')">トップに戻る</button>
  </div>
</div>

<div id="screen-manager" class="screen">
  <div class="container-sm">
    <div class="header-row">
      <button class="btn ghost" onclick="show('top')">← 戻る</button>
      <span style="font-weight:600">採用担当者</span>
    </div>
    <div style="display:flex;gap:.5rem;margin-bottom:1rem">
      <label class="btn" style="flex:1;justify-content:center;cursor:pointer">データを読み込む<input type="file" accept=".json" onchange="importSessions(event)" style="display:none"></label>
      <button class="btn" style="flex:1" onclick="exportAllSessions()">全データを書き出す</button>
    </div>
    <div class="stat-grid" id="mgr-stats"></div>
    <div style="display:flex;gap:.5rem;margin-bottom:.75rem">
      <input type="text" id="mgr-search" placeholder="候補者名で検索..." oninput="renderManager()" style="flex:1">
      <select id="mgr-filter" onchange="renderManager()" style="width:100px">
        <option value="">すべて</option>
        <option value="中途">中途</option>
        <option value="新卒">新卒</option>
        <option value="pending">判定待ち</option>
        <option value="pass">合格</option>
        <option value="fail">不合格</option>
      </select>
    </div>
    <div class="card" style="padding:0;overflow:hidden"><div id="mgr-list"></div></div>
  </div>
</div>

<div id="screen-detail" class="screen">
  <div class="container-sm">
    <div class="header-row">
      <button class="btn ghost" onclick="show('manager');renderManager()">← 一覧</button>
      <button class="btn" onclick="printDetail()" style="border-color:var(--teal);color:var(--teal)">📄 印刷</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const AXES=["技術力","コミュニケーション","論理的思考","リーダーシップ","主体性","成長意欲"];
const DEFAULT_TEMPLATES={
  "1次面接":[{axis:"技術力",text:"これまでの経験で最も難しかった仕事を教えてください。"},{axis:"コミュニケーション",text:"チームで意見が対立したとき、どのように解決しましたか？"},{axis:"成長意欲",text:"なぜ転職（就職）を考えたのですか？"}],
  "2次面接":[{axis:"論理的思考",text:"前回の面接でお話しいただいた経験について、もう少し詳しく聞かせてください。"},{axis:"リーダーシップ",text:"チームをまとめた経験はありますか？具体的に教えてください。"},{axis:"主体性",text:"自分から率先して動いた具体的な経験を教えてください。"}],
  "最終面接":[{axis:"成長意欲",text:"5年後のキャリアビジョンを教えてください。"},{axis:"コミュニケーション",text:"弊社のどんな点に魅力を感じていますか？"},{axis:"技術力",text:"入社後にどんな貢献ができると思いますか？"}]
};
const FOLLOWUP_BANK={
  "技術力":["その解決策を選んだ理由を、他の選択肢と比較して教えてもらえますか？","技術的に一番苦労した点は具体的にどこでしたか？","同じ状況が再び起きたら、次は何を変えますか？"],
  "コミュニケーション":["反対意見が最も強かった方をどう説得しましたか？","自分の意見が通らなかった場合、どう対応しましたか？","その経験後、チームの関係性に変化はありましたか？"],
  "論理的思考":["その判断に至るプロセスを順番に教えてもらえますか？","他にどんな選択肢を検討しましたか？","もし前提条件が変わっていたら、判断は変わりましたか？"],
  "リーダーシップ":["チームをまとめる上で、一番意識していることは何ですか？","メンバーのモチベーションが下がったとき、どう対処しましたか？","自分のリーダーシップスタイルをひとことで表すと？"],
  "主体性":["その行動を起こすきっかけは何でしたか？","周囲から反対されたとき、どう乗り越えましたか？","誰かに言われる前に動いた具体的な例を教えてください。"],
  "成長意欲":["そのビジョンに向けて、今具体的に取り組んでいることは？","弊社のどんな点が、そのビジョンに合うと感じていますか？","ここ1年で一番成長できたと感じることは何ですか？"]
};

let sessions=JSON.parse(localStorage.getItem('iv_sessions')||'[]');
let currentSession=null,currentQ=0,axisRatingScores={},prevSession=null;
let allAxes=JSON.parse(localStorage.getItem('iv_axes')||'null')||[...AXES];
let selectedAxes=JSON.parse(localStorage.getItem('iv_selected_axes')||'null')||["技術力","コミュニケーション","成長意欲"];
let stageTemplates=JSON.parse(localStorage.getItem('iv_stage_templates')||'null')||JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
let currentEditStage="1次面接";
let questions=[],answers=[];

function printSheet(){
  const name=document.getElementById('setup-name').value.trim()||'　　　　　　';
  const pos=document.getElementById('setup-pos').value.trim()||'　　　　　　';
  const type=document.getElementById('setup-type').value;
  const validQs=questions.filter(q=>q.text.trim());
  if(!validQs.length){alert('質問テンプレートを設定してください');return;}
  const axes=selectedAxes.length?selectedAxes:[...new Set(validQs.map(q=>q.axis))];

  const qRows=validQs.map((q,i)=>`
    <div class="ps-qblock">
      <div class="ps-qheader">
        <span class="ps-qnum">Q${i+1}</span>
        <span class="ps-axis">${q.axis}</span>
        <span class="ps-qtext">${q.text}</span>
      </div>
      <div class="ps-fields">
        <div class="ps-field-label">回答メモ</div>
        <div class="ps-field-box" style="height:72px"></div>
        <div class="ps-field-label" style="margin-top:6px">面接官メモ</div>
        <div class="ps-field-box" style="height:44px"></div>
      </div>
    </div>`).join('');

  const axisRows=axes.map(a=>`
    <div class="ps-axis-row">
      <div class="ps-axis-name">${a}</div>
      <div class="ps-stars">☆☆☆☆☆</div>
      <div class="ps-axis-memo"><div class="ps-field-box" style="height:28px;flex:1"></div></div>
    </div>`).join('');

  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
  <title>面接シート_${name}_${type}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:11px;color:#111;padding:16px 20px;line-height:1.5}

function saveSessions(){
  localStorage.setItem('iv_sessions',JSON.stringify(sessions));
}

async function syncToCloud(session){
  try{
    await fetch('/api/sessions',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(session)
    });
  }catch(e){console.log('cloud sync error',e);}
}

async function deleteFromCloud(id){
  try{
    await fetch('/api/sessions?id='+id,{method:'DELETE'});
  }catch(e){console.log('cloud delete error',e);}
}

async function loadFromCloud(){
  try{
    const res=await fetch('/api/sessions');
    const data=await res.json();
    if(Array.isArray(data)&&data.length>0){
      sessions=data;
      localStorage.setItem('iv_sessions',JSON.stringify(sessions));
    }
  }catch(e){console.log('cloud load error',e);}
}
function saveAxes(){
  localStorage.setItem('iv_axes',JSON.stringify(allAxes));
  syncSetting('axes',allAxes);
}
function saveSelectedAxes(){
  localStorage.setItem('iv_selected_axes',JSON.stringify(selectedAxes));
  syncSetting('selected_axes',selectedAxes);
  const msg=document.getElementById('axes-saved-msg');
  if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',2500);}
}
function saveStageTemplates(){
  localStorage.setItem('iv_stage_templates',JSON.stringify(stageTemplates));
  syncSetting('stage_templates',stageTemplates);
}

async function syncSetting(key,data){
  try{
    await fetch('/api/settings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({key,data})
    });
  }catch(e){console.log('settings sync error',e);}
}

async function loadSettings(){
  try{
    const [axesRes,selectedRes,templatesRes]=await Promise.all([
      fetch('/api/settings?key=axes'),
      fetch('/api/settings?key=selected_axes'),
      fetch('/api/settings?key=stage_templates')
    ]);
    const [axesData,selectedData,templatesData]=await Promise.all([
      axesRes.json(),selectedRes.json(),templatesRes.json()
    ]);
    if(axesData){allAxes=axesData;localStorage.setItem('iv_axes',JSON.stringify(allAxes));}
    if(selectedData){selectedAxes=selectedData;localStorage.setItem('iv_selected_axes',JSON.stringify(selectedAxes));}
    if(templatesData){stageTemplates=templatesData;localStorage.setItem('iv_stage_templates',JSON.stringify(stageTemplates));}
  }catch(e){console.log('settings load error',e);}
}

function exportLastSession(){
  if(!sessions.length)return;
  const s=sessions[0];
  const blob=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`面接_${s.name}_${s.type}_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function exportAllSessions(){
  if(!sessions.length){alert('データがありません');return;}
  const blob=new Blob([JSON.stringify(sessions,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`面接データ一覧_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importSessions(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      const incoming=Array.isArray(data)?data:[data];
      let added=0;
      incoming.forEach(s=>{if(!sessions.find(x=>x.id===s.id)){sessions.unshift(s);added++;}});
      saveSessions();renderManager();alert(`${added}件の面接データを読み込みました。`);
    }catch{alert('ファイルの読み込みに失敗しました。');}
  };
  reader.readAsText(file);event.target.value='';
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0);}
async function goInterviewer(){await loadSettings();renderSetup();show('setup');}
function goManager(){renderManager();show('manager');}

function checkHistory(name){
  const hint=document.getElementById('history-hint');
  if(!name.trim()){hint.style.display='none';prevSession=null;return;}
  const stage=document.getElementById('setup-type').value;
  const prevStageMap={"2次面接":"1次面接","最終面接":"2次面接"};
  const prevStage=prevStageMap[stage];
  if(!prevStage){hint.style.display='none';prevSession=null;return;}
  const found=sessions.find(s=>s.name===name.trim()&&s.type===prevStage);
  if(found){
    prevSession=found;hint.style.display='block';
    hint.textContent=`✓ ${prevStage}のデータが見つかりました。面接中に前回の回答を左側に表示します。`;
  }else{prevSession=null;hint.style.display='none';}
}

function onCategoryChange(){
  const category=document.getElementById('setup-category').value;
  const typeSelect=document.getElementById('setup-type');
  // カテゴリに応じてセレクトの色を変える
  if(category==='新卒'){
    typeSelect.style.borderColor='#1D9E75';
    typeSelect.style.background='#E1F5EE';
  } else {
    typeSelect.style.borderColor='#185FA5';
    typeSelect.style.background='#E6F1FB';
  }
}

function onStageChange(){
  const stage=document.getElementById('setup-type').value;
  currentEditStage=stage;questions=[];
  document.querySelectorAll('.stage-tab').forEach(t=>t.classList.toggle('active',t.textContent===stage));
  renderQList();checkHistory(document.getElementById('setup-name').value);
}

function switchStageTab(stage,el){
  currentEditStage=stage;questions=[];
  document.querySelectorAll('.stage-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderQList();
}

function renderSetup(){
  renderAxisTags();
  currentEditStage=document.getElementById('setup-type')?.value||"1次面接";
  questions=[];renderQList();
}

function renderAxisTags(){
  document.getElementById('axis-tags').innerHTML=allAxes.map(a=>`
    <span style="display:inline-flex;align-items:center;gap:3px">
      <span class="tag ${selectedAxes.includes(a)?'on':''}" onclick="toggleAxis('${a}',this)">${a}</span>
      ${AXES.includes(a)?'':`<span onclick="deleteAxis('${a}')" style="font-size:.7rem;color:var(--text3);cursor:pointer;padding:0 2px">✕</span>`}
    </span>`).join('');
}

function toggleAxis(a,el){
  if(selectedAxes.includes(a))selectedAxes=selectedAxes.filter(x=>x!==a);else selectedAxes.push(a);
  el.classList.toggle('on');
}
function addAxis(){
  const input=document.getElementById('new-axis-input');const val=input.value.trim();
  if(!val||allAxes.includes(val)){input.value='';return;}
  allAxes.push(val);selectedAxes.push(val);saveAxes();input.value='';renderAxisTags();renderQList();
}
function deleteAxis(a){
  if(!confirm(`「${a}」を削除しますか？`))return;
  allAxes=allAxes.filter(x=>x!==a);selectedAxes=selectedAxes.filter(x=>x!==a);
  saveAxes();renderAxisTags();renderQList();
}

function renderQList(){
  if(!questions.length)questions=(stageTemplates[currentEditStage]||DEFAULT_TEMPLATES[currentEditStage]||[]).map(q=>({...q}));
  document.getElementById('q-list').innerHTML=questions.map((q,i)=>`
    <div class="q-row" draggable="true" style="display:flex;gap:.5rem;margin-bottom:.5rem;align-items:flex-start;border:1.5px solid transparent;border-radius:var(--radius-sm);padding:2px;transition:border-color .15s"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dragDrop(event,${i})" ondragend="dragEnd(event)">
      <div style="padding:.4rem .2rem;color:var(--text3);flex-shrink:0;margin-top:1.8rem;cursor:grab">⠿</div>
      <div style="flex:1">
        <select onchange="questions[${i}].axis=this.value" style="margin-bottom:.3rem;font-size:.8rem">
          ${allAxes.map(a=>`<option ${q.axis===a?'selected':''}>${a}</option>`).join('')}
        </select>
        <input type="text" value="${q.text}" oninput="questions[${i}].text=this.value" placeholder="質問を入力...">
      </div>
      <button class="btn ghost" onclick="questions.splice(${i},1);renderQList()" style="padding:.4rem .6rem;margin-top:1.8rem">✕</button>
    </div>`).join('');
  initDrag();
}

let dragSrcIdx=null;
function initDrag(){
  document.querySelectorAll('.q-row').forEach(row=>{
    row.addEventListener('dragenter',()=>row.style.borderColor='var(--teal)');
    row.addEventListener('dragleave',()=>row.style.borderColor='transparent');
  });
}
function dragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';setTimeout(()=>e.target.closest('.q-row').style.opacity='.4',0);}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function dragDrop(e,toIdx){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===toIdx)return;const moved=questions.splice(dragSrcIdx,1)[0];questions.splice(toIdx,0,moved);renderQList();}
function dragEnd(e){e.target.closest('.q-row').style.opacity='1';document.querySelectorAll('.q-row').forEach(r=>r.style.borderColor='transparent');dragSrcIdx=null;}

function saveTemplateSet(){
  const validQs=questions.filter(q=>q.text.trim());
  if(!validQs.length){alert('質問を入力してください');return;}
  stageTemplates[currentEditStage]=validQs.map(q=>({...q}));saveStageTemplates();
  const msg=document.getElementById('template-saved-msg');
  if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',2000);}
}
function addQuestion(){questions.push({axis:selectedAxes[0]||allAxes[0],text:''});renderQList();}

function startInterview(){
  const name=document.getElementById('setup-name').value.trim();
  const pos=document.getElementById('setup-pos').value.trim();
  const type=document.getElementById('setup-type').value;
  if(!name){alert('候補者名を入力してください');return;}
  const category=document.getElementById('setup-category').value;
  const interviewer=document.getElementById('setup-interviewer').value.trim();
  const validQs=questions.filter(q=>q.text.trim());
  if(!validQs.length){alert('質問を入力してください');return;}
  currentSession={id:Date.now(),name,pos,type,category,interviewer,questions:validQs,axes:[...selectedAxes],createdAt:new Date().toISOString(),status:'pending'};
  currentQ=0;axisRatingScores={};
  answers=validQs.map(()=>({answer:'',memo:'',followupQ:'',followupA:'',ownQ:'',skipped:false,freeQs:[]}));
  const now=new Date();
  const dateStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('iv-name').textContent=name;
  const interviewerLabel=interviewer?` | 面接官: ${interviewer}`:'';
  document.getElementById('iv-pos').textContent=(pos||'')+' | '+(category?category+' ':'')+type+' | '+dateStr+interviewerLabel;
  renderQuestion();show('interview');
}

function renderQuestion(){
  const q=currentSession.questions[currentQ];
  const a=answers[currentQ];
  const total=currentSession.questions.length;
  document.getElementById('iv-bar').style.width=Math.round(currentQ/total*100)+'%';
  document.getElementById('iv-prog').textContent=(currentQ+1)+' / '+total;
  document.getElementById('iv-dots').innerHTML=currentSession.questions.map((_,i)=>{
    let c='step-dot';if(i<currentQ)c+=' done';else if(i===currentQ)c+=' active';return`<div class="${c}"></div>`;
  }).join('');

  const fqOptions=(FOLLOWUP_BANK[q.axis]||[]).map(fq=>`<option value="${fq}">${fq}</option>`).join('');

  let prevAnswer=null,prevQ=null;
  if(prevSession){
    const idx=prevSession.questions?.findIndex(pq=>pq.axis===q.axis);
    if(idx!==-1&&idx!==undefined){prevAnswer=prevSession.answers?.[idx];prevQ=prevSession.questions?.[idx];}
    if(!prevAnswer){prevAnswer=prevSession.answers?.[currentQ];prevQ=prevSession.questions?.[currentQ];}
  }

  const prevHTML=prevAnswer?`
    <div class="iv-prev">
      <div class="iv-prev-label">${prevSession.type} の回答</div>
      <div class="iv-prev-q">${prevQ?.text||''}</div>
      <div class="iv-prev-a">${prevAnswer.answer||'（回答なし）'}</div>
      ${prevAnswer.memo?`
        <div class="iv-prev-memo" style="margin-top:.5rem">
          <div style="font-size:.7rem;color:var(--amber-text);font-weight:600;margin-bottom:.2rem">前回の面接官メモ</div>
          <div style="font-size:.85rem;color:var(--text2);font-style:normal">${prevAnswer.memo}</div>
        </div>`:''}
      ${prevAnswer.followupQ?`<div style="margin-top:.5rem;padding:.5rem;background:rgba(83,74,183,.08);border-radius:var(--radius-sm)"><div style="font-size:.7rem;color:var(--purple-text);font-weight:600;margin-bottom:.2rem">深掘り</div><div style="font-size:.8rem;font-weight:600;color:var(--purple-text)">${prevAnswer.followupQ}</div><div style="font-size:.8rem;color:var(--text2)">${prevAnswer.followupA||''}</div></div>`:''}
    </div>`:'';

  const currentHTML=`
    <div class="iv-current">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem">
        <span class="meta">質問 ${currentQ+1}</span>
        <span class="badge blue">${q.axis}</span>
        ${prevSession?`<span class="badge purple">${currentSession.type}</span>`:''}
      </div>
      <div style="font-size:1rem;font-weight:600;line-height:1.6;margin-bottom:.75rem">${q.text}</div>
      <div>
        <div style="font-size:.75rem;color:var(--text3);margin-bottom:.3rem">回答メモ</div>
        <textarea id="ans-text" placeholder="候補者の回答をここに入力..." style="min-height:90px">${a.answer}</textarea>
      </div>
      <div class="memo-col" style="margin-top:.5rem">
        <div class="memo-col-label">面接官メモ</div>
        <textarea id="memo-text" placeholder="気になった点・所感など..." style="min-height:72px;background:transparent;border-color:#EF9F27">${a.memo}</textarea>
      </div>
      <div class="followup-box">
        <div class="followup-label">深掘り質問（任意）</div>
        ${!a.skipped?`
          <select id="fq-select" onchange="pickFollowup(this.value)" style="margin-bottom:.5rem;font-size:.85rem">
            <option value="">— 提案から選ぶ —</option>${fqOptions}
          </select>
          <input type="text" id="own-q" placeholder="または自分で入力..." value="${a.ownQ}" oninput="answers[currentQ].ownQ=this.value">
          ${(a.followupQ||a.ownQ)?`<label style="margin-top:.5rem">深掘りへの回答</label><textarea id="fq-ans" placeholder="回答を入力...">${a.followupA}</textarea>`:''}`
          :`<span class="badge gray">スキップ済み</span>`}
      </div>
      <div style="margin-top:.75rem">
        <div id="free-q-area"></div>
        <button class="btn ghost" style="width:100%;margin-top:.3rem" onclick="showFreeQInput()">＋ 自由質問を追加</button>
      </div>
    </div>`;

  document.getElementById('iv-content').innerHTML=`
    ${prevAnswer?`<div class="iv-layout">${prevHTML}${currentHTML}</div>`:currentHTML}
    <div class="btn-row" style="margin-top:.75rem">
      ${currentQ>0?`<button class="btn ghost" onclick="prevQ()">← 前へ</button>`:''}
      ${!a.skipped?`<button class="btn ghost" onclick="skipFollowup()">深掘りをスキップ</button>`:''}
      <button class="btn primary" onclick="nextQ()">${currentQ<currentSession.questions.length-1?'次の質問 →':'評価へ進む →'}</button>
    </div>`;

  const ta=document.getElementById('ans-text');if(ta)ta.addEventListener('input',()=>answers[currentQ].answer=ta.value);
  const mt=document.getElementById('memo-text');if(mt)mt.addEventListener('input',()=>answers[currentQ].memo=mt.value);
  const fqAns=document.getElementById('fq-ans');if(fqAns)fqAns.addEventListener('input',()=>answers[currentQ].followupA=fqAns.value);
  renderFreeQs();
}

function pickFollowup(val){
  if(!val)return;answers[currentQ].followupQ=val;
  const oq=document.getElementById('own-q');if(oq){oq.value='';answers[currentQ].ownQ='';}
  renderQuestion();setTimeout(()=>{const s=document.getElementById('fq-select');if(s)s.value=val;},10);
}
function showFreeQInput(){
  const area=document.getElementById('free-q-area');
  if(!area||area.querySelector('.free-q-input-row'))return;
  const row=document.createElement('div');row.className='free-q-input-row';
  row.style.cssText='display:flex;gap:.5rem;align-items:flex-start;margin-bottom:.5rem';
  row.innerHTML=`<div style="flex:1"><input type="text" id="free-q-text" placeholder="質問を入力..." style="margin-bottom:.3rem"><textarea id="free-q-ans" placeholder="回答メモ..." style="min-height:52px"></textarea></div><button class="btn teal" onclick="addFreeQ()" style="padding:.5rem .875rem;flex-shrink:0">追加</button>`;
  area.appendChild(row);document.getElementById('free-q-text').focus();
}
function addFreeQ(){
  const qEl=document.getElementById('free-q-text');const aEl=document.getElementById('free-q-ans');
  if(!qEl||!qEl.value.trim())return;
  if(!answers[currentQ].freeQs)answers[currentQ].freeQs=[];
  answers[currentQ].freeQs.push({q:qEl.value.trim(),a:aEl?aEl.value:''});
  renderFreeQs();document.querySelector('.free-q-input-row')?.remove();
}
function removeFreeQ(idx){answers[currentQ].freeQs.splice(idx,1);renderFreeQs();}
function renderFreeQs(){
  const area=document.getElementById('free-q-area');if(!area)return;
  area.querySelectorAll('.free-q-entry').forEach(e=>e.remove());
  (answers[currentQ].freeQs||[]).forEach((item,idx)=>{
    const div=document.createElement('div');div.className='free-q-entry';
    div.style.cssText='border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.5rem';
    div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem"><span style="font-size:.8rem;font-weight:600">${item.q}</span><button class="btn ghost" onclick="removeFreeQ(${idx})" style="padding:.2rem .5rem;font-size:.75rem">✕</button></div><textarea placeholder="回答メモ..." style="min-height:52px" oninput="answers[currentQ].freeQs[${idx}].a=this.value">${item.a}</textarea>`;
    area.insertBefore(div,area.firstChild);
  });
}
function skipFollowup(){answers[currentQ].skipped=true;renderQuestion();}
function prevQ(){if(currentQ>0){currentQ--;renderQuestion();}}
function nextQ(){
  const ta=document.getElementById('ans-text');if(ta)answers[currentQ].answer=ta.value;
  const mt=document.getElementById('memo-text');if(mt)answers[currentQ].memo=mt.value;
  const fqAns=document.getElementById('fq-ans');if(fqAns)answers[currentQ].followupA=fqAns.value;
  const ownQ=document.getElementById('own-q');if(ownQ)answers[currentQ].ownQ=ownQ.value;
  if(currentQ<currentSession.questions.length-1){currentQ++;renderQuestion();window.scrollTo(0,0);}
  else renderAxisRating();
}

let aiEvalResult = null;

function renderAxisRating(){
  const axes=currentSession.axes.length?currentSession.axes:[...new Set(currentSession.questions.map(q=>q.axis))];
  document.getElementById('iv-content').innerHTML=`
    <div class="card">
      <div style="font-size:1rem;font-weight:600;margin-bottom:.25rem">評価してください</div>

async function runAiEval(){
  const btn=document.getElementById('ai-eval-btn');
  const area=document.getElementById('ai-eval-area');
  btn.disabled=true;btn.textContent='分析中...';
  area.innerHTML=`<div style="text-align:center;padding:1rem;color:var(--text3);font-size:.875rem">AIが回答内容を分析しています...</div>`;
  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        questions:currentSession.questions,
        answers:answers,
        axes:currentSession.axes
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    aiEvalResult=data;
    renderAiResult(data);
    // AI評価を星に反映（参考として）
    if(data.axisScores){
      Object.entries(data.axisScores).forEach(([axis,val])=>{
        if(!axisRatingScores[axis]){
          axisRatingScores[axis]=val.score;
          document.querySelectorAll(`#stars-${CSS.escape(axis)} .star`).forEach((s,i)=>s.classList.toggle('active',i<val.score));
        }
      });
    }
  }catch(e){
    area.innerHTML=`<div style="padding:.75rem;background:var(--red-bg);border-radius:var(--radius-sm);font-size:.8rem;color:var(--red-text);margin-bottom:1rem">AI分析エラー: ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent='✦ AIで再分析する';
}

function renderAiResult(data){
  const area=document.getElementById('ai-eval-area');
  const axisRows=data.axisScores?Object.entries(data.axisScores).map(([axis,val])=>`
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
      <div style="font-size:.8rem;color:var(--text2);width:100px;flex-shrink:0">${axis}</div>
      <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${val.score*20}%;background:var(--purple);border-radius:3px"></div>
      </div>
      <div style="font-size:.8rem;font-weight:600;width:20px;color:var(--purple)">${val.score}</div>
      <div style="font-size:.75rem;color:var(--text3);flex:1">${val.reason||''}</div>
    </div>`).join(''):'';

  area.innerHTML=`
    <div style="background:var(--purple-bg);border:1px solid #AFA9EC;border-radius:var(--radius);padding:1rem;margin-bottom:1.25rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem">
        <div style="font-size:.8rem;font-weight:600;color:var(--purple-text)">✦ AI分析結果</div>
        <div style="font-size:1.25rem;font-weight:700;color:var(--purple-text)">${data.totalScore}<span style="font-size:.75rem;font-weight:400">/100</span></div>
      </div>
      ${axisRows}
      ${data.strengths?.length?`
        <div style="margin-top:.875rem;padding:.6rem .75rem;background:var(--teal-bg);border-radius:var(--radius-sm)">
          <div style="font-size:.7rem;color:var(--teal-text);font-weight:600;margin-bottom:.3rem">強み</div>
          ${data.strengths.map(s=>`<div style="font-size:.8rem;color:var(--text2)">・${s}</div>`).join('')}
        </div>`:''}
      ${data.concerns?.length?`
        <div style="margin-top:.5rem;padding:.6rem .75rem;background:var(--amber-bg);border-radius:var(--radius-sm)">
          <div style="font-size:.7rem;color:var(--amber-text);font-weight:600;margin-bottom:.3rem">懸念点</div>
          ${data.concerns.map(c=>`<div style="font-size:.8rem;color:var(--text2)">・${c}</div>`).join('')}
        </div>`:''}
      ${data.summary?`<div style="margin-top:.75rem;font-size:.8rem;color:var(--purple-text);line-height:1.6">${data.summary}</div>`:''}
    </div>`;
}
function setAxisScore(axis,n){
  axisRatingScores[axis]=n;
  document.querySelectorAll(`#stars-${CSS.escape(axis)} .star`).forEach((s,i)=>s.classList.toggle('active',i<n));
}
function finishInterview(){
  const axisScores={};Object.keys(axisRatingScores).forEach(k=>axisScores[k]=axisRatingScores[k]*20);
  const vals=Object.values(axisRatingScores);const avg=vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:0;
  const overallMemo=document.getElementById('overall-memo')?.value||'';
  currentSession.answers=answers;currentSession.axisScores=axisScores;currentSession.avgScore=Math.round(avg*20);currentSession.aiEval=aiEvalResult;aiEvalResult=null;
  currentSession.overallMemo=overallMemo;currentSession.status='pending';currentSession.completedAt=new Date().toISOString();
  sessions.unshift(currentSession);saveSessions();syncToCloud(currentSession);
  const deepCount=answers.filter(a=>(a.followupQ||a.ownQ)&&!a.skipped).length;
  document.getElementById('done-stats').innerHTML=`
    <div class="stat"><div class="stat-val">${answers.filter(a=>a.answer.trim()).length}</div><div class="stat-label">回答した質問</div></div>
    <div class="stat"><div class="stat-val">${deepCount}</div><div class="stat-label">深掘り実施</div></div>
    <div class="stat"><div class="stat-val">${currentSession.avgScore}</div><div class="stat-label">平均スコア</div></div>`;
  show('done');
}

async function renderManager(){
  await loadFromCloud();
  sessions=JSON.parse(localStorage.getItem('iv_sessions')||'[]');
  const total=sessions.length,passed=sessions.filter(s=>s.verdict==='pass').length,pending=sessions.filter(s=>s.status==='pending').length;
  document.getElementById('mgr-stats').innerHTML=`
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">面接済み</div></div>
    <div class="stat"><div class="stat-val">${passed}</div><div class="stat-label">合格</div></div>
    <div class="stat"><div class="stat-val">${pending}</div><div class="stat-label">判定待ち</div></div>`;
  const list=document.getElementById('mgr-list');
  if(!sessions.length){list.innerHTML='<div class="empty">まだ面接データがありません</div>';return;}

  const keyword=(document.getElementById('mgr-search')?.value||'').trim().toLowerCase();
  const filter=document.getElementById('mgr-filter')?.value||'';

  const filtered=sessions.map((s,i)=>({s,i})).filter(({s})=>{
    const matchName=!keyword||s.name.toLowerCase().includes(keyword);
    const matchFilter=!filter||(filter==='pending'&&s.status==='pending')||(filter==='pass'&&s.verdict==='pass')||(filter==='fail'&&s.verdict==='fail')||(filter==='中途'&&s.category==='中途')||(filter==='新卒'&&s.category==='新卒');
    return matchName&&matchFilter;
  });

  if(!filtered.length){list.innerHTML='<div class="empty">該当する候補者がいません</div>';return;}

  list.innerHTML=filtered.map(({s,i})=>`
    <div class="list-item" style="position:relative">
      <div onclick="openDetail(${i})" style="display:flex;align-items:center;gap:.75rem;flex:1;cursor:pointer">
        <div class="avatar">${s.name.charAt(0)}</div>
        <div style="flex:1"><div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem"><span style="font-weight:600;font-size:.9rem">${s.name}</span>${s.category?`<span class="${s.category==='新卒'?'cat-shinsotsu':'cat-chuto'}">${s.category}</span>`:''}</div><div class="meta">${s.pos||''} | ${s.type} | ${s.createdAt?new Date(s.createdAt).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}):''} ${s.interviewer?'| 面接官: '+s.interviewer:''}</div></div>
        <div style="text-align:right;margin-right:.5rem">
          <div style="font-size:1rem;font-weight:600">${s.avgScore}<span style="font-size:.7rem;color:var(--text3)">/100</span></div>
          <span class="badge ${s.verdict==='pass'?'teal':s.verdict==='fail'?'red':'gray'}">${s.verdict==='pass'?'合格':s.verdict==='fail'?'不合格':'判定待'}</span>
        </div>
      </div>
      <button class="btn ghost" onclick="deleteSession(${i})" style="padding:.3rem .5rem;color:var(--red-text);flex-shrink:0" title="削除">✕</button>
    </div>`).join('');
}

function deleteSession(idx){
  const s=sessions[idx];
  if(!confirm(`「${s.name}（${s.type}）」のデータを削除しますか？この操作は元に戻せません。`))return;
  deleteFromCloud(s.id);
  sessions.splice(idx,1);
  saveSessions();
  renderManager();
}

    <div><div style="font-size:9px;color:#888">合否</div><div style="font-size:14px;font-weight:700;color:${verdictColor}">${verdictText}</div></div>
  </div>

  ${s.comment?`<div style="margin-bottom:12px;padding:8px 10px;background:#f8f7f4;border-radius:6px"><div style="font-size:9px;color:#888;margin-bottom:3px">担当者コメント</div><div style="font-size:11px;line-height:1.6">${s.comment}</div></div>`:''}

  <div style="display:grid;grid-template-columns:${s.aiEval?'1fr 1fr':'1fr'};gap:12px;margin-bottom:12px">
    <div>
      <div style="font-size:10px;font-weight:700;color:#1D9E75;border-bottom:1px solid #1D9E75;padding-bottom:3px;margin-bottom:8px">面接官の評価</div>
      <div style="margin-bottom:4px;font-size:10px;font-weight:600">総合: ${s.avgScore}/100</div>
      ${axisRows}
      ${s.overallMemo?`<div style="margin-top:6px;padding:5px 8px;background:#FAEEDA;border-radius:4px"><div style="font-size:9px;color:#633806;margin-bottom:2px">総評メモ</div><div style="font-size:11px">${s.overallMemo}</div></div>`:''}
    </div>
    ${s.aiEval?`
    <div>
      <div style="font-size:10px;font-weight:700;color:#534AB7;border-bottom:1px solid #534AB7;padding-bottom:3px;margin-bottom:8px">AI分析結果</div>
      <div style="margin-bottom:4px;font-size:10px;font-weight:600">総合: ${s.aiEval.totalScore}/100</div>
      ${aiRows}
      ${s.aiEval.strengths?.length?`<div style="margin-top:5px;padding:4px 7px;background:#E1F5EE;border-radius:4px"><div style="font-size:9px;color:#0F6E56;font-weight:600;margin-bottom:2px">強み</div>${s.aiEval.strengths.map(st=>`<div style="font-size:10px">・${st}</div>`).join('')}</div>`:''}
      ${s.aiEval.concerns?.length?`<div style="margin-top:4px;padding:4px 7px;background:#FAEEDA;border-radius:4px"><div style="font-size:9px;color:#633806;font-weight:600;margin-bottom:2px">懸念点</div>${s.aiEval.concerns.map(c=>`<div style="font-size:10px">・${c}</div>`).join('')}</div>`:''}
      ${s.aiEval.summary?`<div style="margin-top:4px;font-size:10px;color:#3C3489;line-height:1.5">${s.aiEval.summary}</div>`:''}
    </div>`:''}
  </div>

  <div style="font-size:10px;font-weight:700;color:#1D9E75;border-bottom:1px solid #1D9E75;padding-bottom:3px;margin-bottom:8px">面接ログ</div>
  ${qaRows}

  <div style="margin-top:12px;padding-top:8px;border-top:1px solid #eee;display:flex;justify-content:space-between;font-size:9px;color:#888">
    <span>面接合否ボット</span><span>出力日: ${new Date().toLocaleDateString('ja-JP')}</span>
  </div>
  </body></html>`;

  const w=window.open('','_blank','width=900,height=1100');
  w.document.write(html);w.document.close();
  setTimeout(()=>w.print(),400);
}

let currentDetailIdx=null;

function decide(idx,result){
  const comment=document.getElementById('verdict-comment')?.value||'';
  sessions[idx].verdict=result;sessions[idx].comment=comment;sessions[idx].status='decided';sessions[idx].decidedAt=new Date().toISOString();
  saveSessions();syncToCloud(sessions[idx]);openDetail(idx);
}
function resetVerdict(idx){sessions[idx].verdict=null;sessions[idx].status='pending';saveSessions();openDetail(idx);}
</script>
</body>
</html>
